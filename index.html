<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador Produtos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-gray-100">
    <main class="max-w-6xl p-6 mx-auto">
      <div class="p-6 mb-6 bg-white rounded-lg shadow-md">
        <div class="grid gap-4 md:grid-cols-2 lg:grid-cols-5">
          <input
            class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            type="text"
            id="productName"
            placeholder="Qual o nome do produto"
          />
          <input
            class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            type="number"
            id="productPrice"
            placeholder="Preço"
          />
          <input
            class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            type="number"
            id="productQuantity"
            placeholder="Quantidade"
          />
          <select
            class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
            id="categories"
          >
            <option value="eletronicos">Eletrônicos</option>
            <option value="alimentos">Alimentos</option>
            <option value="roupas">Roupas</option>
          </select>

          <button
            id="saveProduct"
            class="px-4 py-2 text-white transition bg-blue-600 rounded-lg hover:bg-blue-700"
          >
            Cadastrar Produto
          </button>
        </div>
      </div>
      <div
        id="totalValueStock"
        class="inline-block px-4 py-2 font-bold border border-indigo-100 rounded-full bg-indigo-50"
      ></div>
      <div
        id="resumeProducts"
        class="grid grid-cols-1 gap-4 md:grid-cols-2 lg:grid-cols-3"
      ></div>
    </main>
    <script src="/Js/index.js"></script>
  </body>
</html>
