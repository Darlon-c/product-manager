<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finance App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body class="min-h-screen font-sans bg-slate-50">
    <nav class="p-4 text-white bg-teal-600 shadow-md">
      <div class="container flex items-center justify-between mx-auto">
        <h1 class="text-xl font-bold tracking-tight">
          <i class="mr-2 fa-solid fa-wallet"></i>MyFinance
        </h1>
      </div>
    </nav>

    <main class="container p-4 mx-auto md:p-8">
      <div class="grid grid-cols-1 gap-8 lg:grid-cols-3">
        <aside class="lg:col-span-1">
          <div
            class="p-6 bg-white border shadow-sm rounded-2xl border-slate-200"
          >
            <h2 class="mb-4 text-lg font-semibold text-slate-700">
              Novo Registro
            </h2>

            <div class="space-y-4">
              <div>
                <label class="text-xs font-bold uppercase text-slate-500"
                  >Descrição</label
                >
                <input
                  id="inputName"
                  type="text"
                  placeholder="Ex: Aluguel"
                  class="w-full px-4 py-2 mt-1 transition-all border rounded-lg outline-none bg-slate-50 border-slate-200 focus:ring-2 focus:ring-indigo-500"
                />
              </div>

              <div>
                <label class="text-xs font-bold uppercase text-slate-500"
                  >Valor (R$)</label
                >
                <input
                  id="price"
                  type="number"
                  placeholder="0.00"
                  class="w-full px-4 py-2 mt-1 transition-all border rounded-lg outline-none bg-slate-50 border-slate-200 focus:ring-2 focus:ring-indigo-500"
                />
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div>
                  <label class="text-xs font-bold uppercase text-slate-500"
                    >Tipo</label
                  >
                  <select
                    id="type"
                    class="w-full px-3 py-2 mt-1 border rounded-lg outline-none cursor-pointer bg-slate-50 border-slate-200"
                  >
                    <option value="entry">Entrada</option>
                    <option value="exit">Saída</option>
                  </select>
                </div>
                <div>
                  <label class="text-xs font-bold uppercase text-slate-500"
                    >Categoria</label
                  >
                  <select
                    id="categories"
                    class="w-full px-3 py-2 mt-1 border rounded-lg outline-none cursor-pointer bg-slate-50 border-slate-200"
                  >
                    <option value="alimentação">Alimentação</option>
                    <option value="transporte">Transporte</option>
                    <option value="lazer">Lazer</option>
                    <option value="outros">Outros</option>
                  </select>
                </div>
              </div>

              <div>
                <label class="text-xs font-bold uppercase text-slate-500"
                  >Data</label
                >
                <input
                  id="date"
                  type="date"
                  class="w-full px-4 py-2 mt-1 border rounded-lg outline-none bg-slate-50 border-slate-200"
                />
              </div>

              <button
                id="register"
                class="w-full py-3 font-bold text-white transition-all transform bg-teal-600 rounded-lg shadow-lg hover:bg-teal-700 shadow-indigo-200 active:scale-95"
              >
                Registrar Transação
              </button>
            </div>
          </div>
        </aside>

        <section class="space-y-6 lg:col-span-2">
          <div
            class="flex flex-col justify-between gap-4 p-4 bg-white border shadow-sm md:flex-row md:items-center rounded-xl border-slate-100"
          >
            <div class="flex items-center gap-2">
              <span class="text-sm font-medium text-slate-500"
                >Filtrar por:</span
              >
              <select
                id="filterSelect"
                class="px-3 py-1 text-sm border-none rounded-md outline-none bg-slate-100 focus:ring-2 focus:ring-indigo-500"
              >
                <option value="all">Todos</option>
                <option value="entry">Entradas</option>
                <option value="exit">Saídas</option>
                <option value="alimentação">Alimentação</option>
                <option value="transporte">Transporte</option>
                <option value="lazer">Lazer</option>
              </select>
            </div>
            <div
              id="totalBalance"
              class="text-xl font-bold tracking-tight text-slate-800"
            ></div>
          </div>

          <div id="listOfRegister" class="space-y-3"></div>
        </section>
      </div>
      <div class="p-4 mt-8 bg-white shadow-sm rounded-xl">
        <h3 class="mb-4 text-lg font-semibold">Resumo Financeiro</h3>
        <canvas id="myChart" style="max-height: 300px"></canvas>
      </div>
    </main>

    <script src="/Js/index.js"></script>
  </body>
</html>
